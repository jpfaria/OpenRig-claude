# NATIVE (non-plugin) OpenRig model ids — built into the app, NOT in plugin manifests.
#
# Enumerated deterministically from the OpenRig app source on disk:
#   grep -rH 'pub const MODEL_ID' ~/Projetos/github.com/jpfaria/OpenRig/crates/block-*/src/*.rs
#
# `type` is derived from the owning crate directory (block-<kind>):
#   block-amp -> amp, block-preamp -> preamp, block-cab -> cab, block-ir -> cab,
#   block-gain -> gain_pedal, block-dyn -> dynamics, block-filter -> eq,
#   block-delay -> delay, block-reverb -> reverb, block-mod -> modulation,
#   block-wah -> wah, block-pitch -> pitch.
#
# These have NO offline param schema (the manifests are the only offline schema),
# so the catalog reports params(id) == None for every id below; downstream
# validation of native params is best-effort (warn-only), per the redesign plan.
#
# Regenerate when the app adds/renames a native block. Count below: 76 unique ids
# (77 `MODEL_ID` declarations; `reverse` is declared in both block-delay and
# block-reverb but is a single model id).

